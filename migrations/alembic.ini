# Alembic configuration for SafarPay shared migrations
# Single migration root — all service schemas managed here.

[alembic]
script_location = %(here)s
version_locations = %(here)s/versions
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = ..
truncate_slug_length = 40

# SQLAlchemy async URL — overridden by env.py using settings
sqlalchemy.url = postgresql+psycopg://safarpay:safarpay_secret@localhost:5432/safarpay_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
